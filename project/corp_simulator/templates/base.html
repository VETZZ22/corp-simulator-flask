<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Симулятор корпорации{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="topbar">
    <a class="logo" href="{{ url_for('index') }}">NovaCorp</a>
    <nav>
        <a href="{{ url_for('index') }}">Панель</a>
        <a href="{{ url_for('strategy') }}">Стратегия</a>
        <a href="{{ url_for('admin_panel') }}">Админ-панель</a>
    </nav>
</header>
<main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="messages">
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
<footer class="footer">Учебная практика · Flask · JSON · Jinja2</footer>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
